version: "3.8"

services:

  oracle-db:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle-db
    platform: linux/amd64
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: oracle
      APP_USER: app
      APP_USER_PASSWORD: app
    volumes:
      - oracle-data:/opt/oracle/oradata

volumes:
  oracle-data: